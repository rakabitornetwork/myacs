# MyACS di belakang Apache + Cloudflare Proxied
# Path VPS: /home/myacs/public_html
# Salin: sudo cp deploy/apache/myacs.conf /etc/apache2/sites-available/myacs.conf
#
# PENTING:
# - GenieACS UI = port 3000, MyACS = port 3001
# - Tanpa ProxyPass, Apache akan 403/404 (folder tanpa index.html)

<VirtualHost *:80>
    ServerName myacs.teslatech.my.id
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName myacs.teslatech.my.id

    # Opsional — hindari Apache serve file statis langsung
    DocumentRoot /home/myacs/public_html

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/myacs.teslatech.my.id/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/myacs.teslatech.my.id/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    <Directory /home/myacs/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    LimitRequestBody 104857600

    # Semua request → MyACS Node.js
    ProxyPass        / http://127.0.0.1:3001/ connectiontimeout=5 timeout=300
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/myacs-error.log
    CustomLog ${APACHE_LOG_DIR}/myacs-access.log combined
</VirtualHost>
</IfModule>
