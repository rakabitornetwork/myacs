# MyACS — Nginx reverse proxy (HTTPS)
# Salin ke: /etc/nginx/sites-available/myacs
# ln -s /etc/nginx/sites-available/myacs /etc/nginx/sites-enabled/
# certbot --nginx -d myacs.teslatech.my.id

upstream myacs_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name myacs.teslatech.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myacs.teslatech.my.id;

    # Certbot akan mengisi path ini
    ssl_certificate     /etc/letsencrypt/live/myacs.teslatech.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myacs.teslatech.my.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;
    access_log /var/log/nginx/myacs.access.log;
    error_log  /var/log/nginx/myacs.error.log;

    # Static uploads (firmware & file dari CPE)
    location /uploads/ {
        alias /var/www/myacs/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Vite build assets
    location /build/ {
        proxy_pass http://myacs_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # TR-069 CWMP — SOAP + upload dari CPE
    location /cwmp {
        proxy_pass http://myacs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }

    location / {
        proxy_pass http://myacs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }
}
